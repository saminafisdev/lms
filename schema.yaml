  /assignment-submissions/:
    get:
      operationId: assignment_submissions_list
      description: |-
        Admin/teacher viewset for reviewing assignment submissions.
        GET  /assignment-submissions/               → list all (filter by ?assignment=, ?status=)
        GET  /assignment-submissions/{id}/          → detail
        POST /assignment-submissions/{id}/review/   → approve or reject with feedback
      parameters:
      - in: query
        name: assignment
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - approved
          - pending
          - rejected
        description: |-
          * `pending` - Pending
          * `approved` - Approved
          * `rejected` - Rejected
      - in: query
        name: user
        schema:
          type: integer
      tags:
      - assignment-submissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssignmentSubmissionList'
          description: ''
  /assignment-submissions/{id}/:
    get:
      operationId: assignment_submissions_retrieve
      description: |-
        Admin/teacher viewset for reviewing assignment submissions.
        GET  /assignment-submissions/               → list all (filter by ?assignment=, ?status=)
        GET  /assignment-submissions/{id}/          → detail
        POST /assignment-submissions/{id}/review/   → approve or reject with feedback
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this assignment submission.
        required: true
      tags:
      - assignment-submissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentSubmission'
          description: ''
  /assignment-submissions/{id}/review/:
    patch:
      operationId: assignment_submissions_review_partial_update
      description: Admin or teacher approves or rejects a submission with optional
        feedback and mark.
      summary: Review assignment submission
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this assignment submission.
        required: true
      tags:
      - assignment-submissions
      requestBody:
        content:
