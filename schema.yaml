  /blogs/:
    get:
      operationId: blogs_list
      description: |-
        ViewSet for blogs.
        - Public: list and retrieve published blogs.
        - Teacher: create, edit own blogs, view own blogs via my_blogs.
        - Admin: full CRUD, approve/reject.
      parameters:
      - in: query
        name: category__slug
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - draft
          - pending
          - published
          - rejected
        description: |-
          * `draft` - Draft
          * `pending` - Pending Approval
          * `published` - Published
          * `rejected` - Rejected
      tags:
      - blogs
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPublicBlogList'
          description: ''
    post:
      operationId: blogs_create
      description: |-
        ViewSet for blogs.
        - Public: list and retrieve published blogs.
        - Teacher: create, edit own blogs, view own blogs via my_blogs.
        - Admin: full CRUD, approve/reject.
      tags:
