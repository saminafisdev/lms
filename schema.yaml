  /teacher/dashboard/:
    get:
      operationId: teacher_dashboard_list
      description: |-
        Returns a stats overview and content lists for the teacher's dashboard.

        **Permissions:** Teacher or Admin only.

        **Role behaviour:**
        - Teacher — scoped to their own active courses.
        - Admin/staff — scoped to all active courses.

        **Stats fields:**
        | Field | Description |
        |---|---|
        | `active_courses` | Number of published courses assigned to this teacher |
        | `live_sessions_today` | Live lessons scheduled for today (UTC) |

        **`upcoming_live_sessions`** — next 5 live lessons, soonest first. Each item includes `live_status`, `enrolled_count`, `zoom_start_url`, `scheduled_at`, and `duration_in_minutes`.

        **`recent_uploads`** — last 5 non-live lessons added (by id desc). Each item includes `id`, `title`, `course_title`, and `content_type` (`video`, `document`, `quiz`, `assignment`, `external_link`).
      summary: Teacher dashboard summary
      tags:
      - teacher
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeacherDashboardResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherDashboardForbidden'
          description: ''
  /teacher/live-sessions/:
    get:
      operationId: teacher_live_sessions_list
      description: |-
        Returns all live lessons belonging to the authenticated teacher's courses, ordered by scheduled time (soonest first).

        **Permissions:** Teacher or Admin only.

        **Role behaviour:**
        - Teacher — only sees live lessons from their own courses.
        - Admin/staff — sees all live lessons across all courses.

        **`?status` filter values:**
        | Value | Description |
        |---|---|
        | `upcoming` | `scheduled_at` is in the future |
        | `live` | session has started but may not have ended |
        | `completed` | `scheduled_at` is in the past |

        **`live_status` field on each item** (computed):
        | Value | Meaning |
        |---|---|
        | `scheduled` | More than 30 min before start |
        | `upcoming` | Within 30 min of start |
        | `live` | Currently in progress |
        | `completed` | Session ended |
        | `null` | No `scheduled_at` set |

        Use `zoom_start_url` for the **Start Session** button (host link).
        Use `zoom_join_url` for the student join link.
      summary: List teacher live sessions
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - live
          - upcoming
        description: 'Filter by session state: `upcoming`, `live`, or `completed`.'
      tags:
      - teacher
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLiveLessonList'
