components:
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    AdminBlog:
      type: object
      description: Full serializer for admin — all fields including status controls.
      properties:
        id:
          type: integer
          readOnly: true
        author:
          type: integer
          nullable: true
        author_detail:
          allOf:
          - $ref: '#/components/schemas/BlogAuthor'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/BlogCategory'
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 300
          pattern: ^[-a-zA-Z0-9_]+$
        cover_image:
          type: string
          format: uri
          nullable: true
        excerpt:
          type: string
          maxLength: 500
        content:
          type: string
        status:
          $ref: '#/components/schemas/StatusB15Enum'
        rejection_reason:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        view_count:
          type: integer
          readOnly: true
        reading_time:
          type: string
          readOnly: true
        published_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author_detail
      - category
      - content
      - created_at
      - id
      - published_at
      - reading_time
      - tags
      - title
      - updated_at
      - view_count
    AdminBook:
      type: object
      description: |-
        Add to any ModelSerializer that has a slug field.
        Handles auto-generation and uniqueness validation.

        Usage:
            class AdminBookSerializer(SlugMixin, serializers.ModelSerializer):
                slug_source_field = 'title'  # field to generate slug from
                ...
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        author:
          type: string
          maxLength: 255
        author_designation:
          type: string
          maxLength: 255
        description:
          type: string
        cover_image:
          type: string
          format: uri
        isbn:
          type: string
          description: 10 or 13 digit ISBN
          maxLength: 20
        language:
          type: string
          maxLength: 100
        publisher:
          type: string
          maxLength: 255
        published_date:
          type: string
          format: date
        number_of_pages:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        sample_file:
          type: string
          format: uri
          nullable: true
          description: Free preview PDF visible to everyone.
        digital_file:
          type: string
          format: uri
          nullable: true
          description: Full PDF delivered to buyers. Never exposed publicly.
        video_url:
          type: string
          format: uri
          nullable: true
          description: Link to a book trailer or intro video
          maxLength: 200
        has_physical:
          type: boolean
        physical_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        stock_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        has_digital:
          type: boolean
        digital_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        tags:
          description: List of tags for the book
        is_visible:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        gallery_images:
          type: array
          items:
            $ref: '#/components/schemas/BookGalleryImage'
          readOnly: true
      required:
      - author
      - author_designation
      - category_name
      - cover_image
      - created_at
      - description
      - gallery_images
      - id
      - isbn
      - language
      - number_of_pages
      - published_date
      - publisher
      - title
      - updated_at
    AdminDoor:
      type: object
      description: Serializer for admin users, including internal management fields.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        content:
          type: string
        icon:
          type: string
          format: uri
        redirect_link:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        is_visible:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
