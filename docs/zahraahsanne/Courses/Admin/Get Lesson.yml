info:
  name: Get Lesson
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/courses/:course_pk/modules/:module_pk/lessons/:id/video/"
  headers:
    - name: Authorization
      value: JWT {{access_token}}
  params:
    - name: id
      value: "22"
      type: path
    - name: module_pk
      value: "1"
      type: path
    - name: course_pk
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
        "title": "Video Lesson",
        "content_type": "video",
        "duration_in_minutes": 10,
        "is_preview": false,
        "is_released": true,
        "order": 11,
        "module": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
